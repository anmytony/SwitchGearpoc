name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_EXTRACTION: ghcr.io/anmytony/switchgear-extraction
  IMAGE_BACKEND: ghcr.io/anmytony/switchgear-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: anmytony
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Python extraction image
        uses: docker/build-push-action@v5
        with:
          context: ./extraction-service
          push: true
          tags: ${{ env.IMAGE_EXTRACTION }}:latest

      - name: Build and push .NET backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/SwitchgearApi
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Python extraction service
        uses: azure/aci-deploy@v1
        with:
          resource-group: RG-cs-PCS-AZ-CR-10119
          dns-name-label: switchgear-extraction
          image: ghcr.io/anmytony/switchgear-extraction:latest
          registry-login-server: ghcr.io
          registry-username: anmytony
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          name: switchgear-extraction
          location: eastus
          ports: 8000
          cpu: 1
          memory: 1.5
          environment-variables: |
            AZURE_DI_ENDPOINT=https://doc-intelligence-switchgear.cognitiveservices.azure.com/
            AZURE_OPENAI_ENDPOINT=https://aesgdhfjgkl.services.ai.azure.com/openai/v1
            AZURE_OPENAI_TEXT_DEPLOYMENT=gpt-4o-mini
            AZURE_OPENAI_VISION_DEPLOYMENT=gpt-4o
            AZURE_OPENAI_EMBEDDING_DEPLOYMENT=text-embedding-3-small
            AZURE_VISION_ENDPOINT=https://abb-switchgear-vision.cognitiveservices.azure.com/
            AZURE_SEARCH_ENDPOINT=https://switchgear-switch.search.windows.net
            AZURE_SEARCH_INDEX_NAME=switchgear-chunks
            LOG_LEVEL=debug
          secure-environment-variables: |
            AZURE_DI_API_KEY=${{ secrets.AZURE_DI_API_KEY }}
            AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}
            AZURE_VISION_API_KEY=${{ secrets.AZURE_VISION_API_KEY }}
            AZURE_SEARCH_API_KEY=${{ secrets.AZURE_SEARCH_API_KEY }}

      - name: Deploy .NET backend
        uses: azure/aci-deploy@v1
        with:
          resource-group: RG-cs-PCS-AZ-CR-10119
          dns-name-label: switchgear-api
          image: ghcr.io/anmytony/switchgear-backend:latest
          registry-login-server: ghcr.io
          registry-username: anmytony
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          name: switchgear-api
          location: eastus
          ports: 8080
          cpu: 1
          memory: 1.5
          environment-variables: |
            ASPNETCORE_ENVIRONMENT=Development
            ASPNETCORE_URLS=http://+:8080
            AzureOpenAI__Endpoint=https://aesgdhfjgkl.services.ai.azure.com/openai/v1
            AzureOpenAI__DeploymentName=gpt-4o-mini
            AzureOpenAI__VisionDeploymentName=gpt-4o
            PythonExtraction__BaseUrl=http://switchgear-extraction.eastus.azurecontainer.io:8000
          secure-environment-variables: |
            ConnectionStrings__DefaultConnection=${{ secrets.SQL_CONNECTION }}
            AzureOpenAI__ApiKey=${{ secrets.AZURE_OPENAI_API_KEY }}
