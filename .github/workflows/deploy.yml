name: Build and Push Images

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: anmytony
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Python extraction image
        uses: docker/build-push-action@v5
        with:
          context: ./extraction-service
          push: true
          tags: ghcr.io/anmytony/switchgear-extraction:latest

      - name: Build and push .NET backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/SwitchgearApi
          push: true
          tags: ghcr.io/anmytony/switchgear-backend:latest

      - name: Build and push Angular frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/switchgear-ui
          push: true
          tags: ghcr.io/anmytony/switchgear-frontend:latest
